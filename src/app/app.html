<div class="min-h-screen bg-gradient-to-br from-pink-50 via-rose-50 to-orange-50">
  <!-- Header -->
  <header class="bg-gradient-to-r from-pink-600 via-red-600 to-yellow-600 text-white shadow-lg">
    <div class="container mx-auto px-4 py-6">
      <h1 class="text-3xl font-bold">Taller RXJS</h1>
      <p class="text-pink-100 mt-2">Instagram V2</p>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto px-4 py-8">
    <!-- User Search -->
    <div class="search-container">
      <h2 class="text-xl font-semibold text-gray-800 mb-4">Search User</h2>
      <div class="flex gap-4">
        <input 
          type="text" 
          placeholder="Enter username (e.g., emilys)" 
          class="search-input"
          (keyup.enter)="searchUser($event)"
          #searchInput
        >
        <button 
          class="search-button"
          (click)="searchUser(searchInput)"
        >
          Search
        </button>
      </div>
      
      <!-- Loading State -->
      <div *ngIf="isLoading" class="mt-6">
        <div class="loading-text">
          <div class="loading-spinner"></div>
          Loading user data...
        </div>
      </div>
      
      <!-- Error State -->
      <div *ngIf="errorMessage" class="mt-6">
        <div class="error-message">
          {{ errorMessage }}
        </div>
      </div>
    </div>

    <!-- User Profile and Posts Display -->
    <div class="content-layout" *ngIf="selectedUser">
      <!-- User Profile Section -->
      <div class="profile-section">
        <app-user-profile [user]="selectedUser"></app-user-profile>
      </div>

      <!-- Posts Loading State -->
      <div *ngIf="isLoadingPosts" class="loading-posts">
        <div class="loading-message">
          <div class="loading-text">
            <div class="loading-spinner"></div>
            Loading user posts and comments...
          </div>
        </div>
      </div>

      <!-- User Posts Section -->
      <div class="posts-section" *ngIf="!isLoadingPosts">
        <app-user-posts 
          [posts]="userPosts" 
          [commentsByPostId]="commentsByPostId">
        </app-user-posts>
      </div>
    </div>
  </main>
</div>
